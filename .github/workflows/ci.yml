name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (web + server)
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

      - name: Build front-end
        run: npm run build

      - name: Smoke test the production server
        run: |
          npm start &
          SERVER_PID=$!
          npx --yes wait-on http://localhost:3000/api/health --timeout 30000
          SMOKE_URL=http://localhost:3000 node scripts/smoke-test.mjs
          kill $SERVER_PID
        env:
          NODE_ENV: production
          PORT: 3000
          AGORA_STEP_DELAY_MS: 0
